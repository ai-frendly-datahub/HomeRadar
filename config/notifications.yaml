notifications:
  enabled: true
  channels:
    - webhook

  webhook_url: "${WEBHOOK_URL}"

  email:
    smtp_host: "${SMTP_HOST}"
    smtp_port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
    from_address: "${EMAIL_FROM}"
    to_addresses:
      - "${EMAIL_TO}"

  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

  rules:
    price_volatility_percent: 5
    new_listing_regions:
      - "서울"
      - "경기"
    new_listing_price_ranges:
      - min: 30000
        max: 150000
    policy_keywords:
      - "정책"
      - "규제"
      - "대출"
      - "세금"
      - "청약"
