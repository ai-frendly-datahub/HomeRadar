    enabled: true
    trust_tier: T2_professional
    collection_tier: daily
    event_model: market_context
    verification_role: market_corroboration
    merge_policy: cannot_override_official_transaction
    info_purpose: news
    region: korea
    url: "https://www.hankyung.com/feed/realestate"
    description: "Korea Economic Daily - Real estate news"
    notes: "Covers market analysis, policy, investment trends. HTTPS feed verified in e2e."
    scope_filter:
      mode: require_home_entity
      apply_to_collection: true
      apply_to_report: true
      reason: "Dedicated real-estate feed can occasionally include adjacent business items; keep only rows with HomeRadar entities."

  - id: korea_policy_news
