    search_url: "https://land.naver.com/search/result"
    timeout: 30
    max_items: 50
    max_pages: 3
    request_delay_min: 2.0
    request_delay_max: 5.0
    description: "Naver Land property listings with anti-bot scraping"
    notes: "Uses random user agents and natural delays to avoid detection. Collects 50+ properties per run."

# Trust tier definitions
trust_tiers:
  T1_official:
    score_multiplier: 1.5
    description: "Government and official sources"
  T2_professional:
    score_multiplier: 1.2
    description: "Professional media and industry sources"
  T3_aggregator:
    score_multiplier: 1.0
    description: "Aggregators and listing platforms"

# Info purpose categories
info_purposes:
  transaction:
    bonus: 100
    description: "Actual transaction data (price, volume)"
  subscription:
    bonus: 80
    description: "Subscription and pre-sale information"
  news:
    bonus: 60
    description: "Market news and analysis"
  listing:
    bonus: 40
    description: "Property listings and market prices"
  development:
    bonus: 90
    description: "Redevelopment and urban planning"
