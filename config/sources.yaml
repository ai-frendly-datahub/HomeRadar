  # TIER 2: Professional Media & Industry Sources (T2_professional)
  # ============================================================================

  - id: mk_realestate
    name: "Maeil Business - Real Estate"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://file.mk.co.kr/news/rss/rss_50300009.xml"
    description: "Maeil Business Newspaper - Real estate section RSS"
    notes: "DISABLED: RSS feed returns empty content (last-modified: 2023-11-02). Major Korean business daily."

  - id: hankyung_realestate
    name: "Korea Economic Daily - Real Estate"
