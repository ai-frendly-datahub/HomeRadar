# HomeRadar Data Sources Configuration
# Real estate data sources for collection and analysis
# Last updated: 2026-04-08
#
# NOTE: MOLIT API sources (molit_apt_transaction, molit_apt_rent) require
# MOLIT_SERVICE_KEY to be configured in GitHub Secrets for CI/CD workflows.
# Obtain a service key from https://www.data.go.kr/data/15126469/openapi.do

sources:
  # ============================================================================
  # TIER 1: Government & Official Sources (T1_official)
  # ============================================================================

  - id: molit_apt_transaction
    name: "MOLIT Apartment Transaction"
    type: api
    enabled: false
    trust_tier: T1_official
    info_purpose: transaction
    region: korea
    url: "http://openapi.molit.go.kr/OpenAPI_ToolInstallPackage/service/rest/RTMSOBJSvc/getRTMSDataSvcAptTradeDev"
    api_doc: "https://www.data.go.kr/data/15126469/openapi.do"
    description: "Ministry of Land, Infrastructure and Transport - Apartment sales transaction data"
    notes: "Requires service key from data.go.kr. Auto-approval. Updated daily."

  - id: molit_apt_rent
    name: "MOLIT Apartment Rent"
    type: api
    enabled: false
    trust_tier: T1_official
    info_purpose: transaction
    region: korea
    url: "http://openapi.molit.go.kr/OpenAPI_ToolInstallPackage/service/rest/RTMSOBJSvc/getRTMSDataSvcAptRent"
    api_doc: "https://www.data.go.kr/data/15126469/openapi.do"
    description: "Ministry of Land, Infrastructure and Transport - Apartment rent (전월세) data"
    notes: "Same API key as apt_transaction. Covers both 전세 and 월세."

  - id: reb_subscription
    name: "Korea Real Estate Board - Subscription Info"
    type: api
    enabled: false
    trust_tier: T1_official
    info_purpose: subscription
    region: korea
    url: "https://api.odcloud.kr/api/ApplyhomeInfoDetailSvc/v1/getAPTLttotPblancDetail"
    api_doc: "https://www.data.go.kr/data/15098547/openapi.do"
    description: "Apartment subscription (청약) and pre-sale information"
    notes: "Includes competition rates, schedules, public housing data."

  # ============================================================================
  # TIER 2: Professional Media & Industry Sources (T2_professional)
  # ============================================================================

  - id: mk_realestate
    name: "Maeil Business - Real Estate"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://file.mk.co.kr/news/rss/rss_50300009.xml"
    description: "Maeil Business Newspaper - Real estate section RSS"
    notes: "DISABLED: RSS feed returns empty content (last-modified: 2023-11-02). Major Korean business daily."

  - id: hankyung_realestate
    name: "Korea Economic Daily - Real Estate"
    type: rss
    enabled: true
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "https://www.hankyung.com/feed/realestate"
    description: "Korea Economic Daily - Real estate news"
    notes: "Covers market analysis, policy, investment trends. HTTPS feed verified in e2e."

  - id: korea_policy_news
    name: "Korea Gov - Policy RSS"
    type: rss
    enabled: true
    trust_tier: T1_official
    info_purpose: news
    region: korea
    url: "https://www.korea.kr/rss/policy.xml"
    description: "Government policy RSS feed (includes land/housing policy updates)"
    notes: "Official government feed. No authentication. Contains policy/land/housing notices."

  - id: korea_pressrelease_news
    name: "Korea Gov - Press Release RSS"
    type: rss
    enabled: true
    trust_tier: T1_official
    info_purpose: news
    region: korea
    url: "https://www.korea.kr/rss/pressrelease.xml"
    description: "Government press release RSS feed (official announcements including real estate policy)"
    notes: "Official government feed. No authentication. Updated from economy.xml which was deprecated."

  - id: herald_realestate_all
    name: "Herald Economy - Real Estate All"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://biz.heraldm.com/rss/010300000000.xml"
    description: "Herald Economy - All real estate news"
    notes: "Comprehensive real estate coverage."

  - id: herald_realestate_policy
    name: "Herald Economy - Real Estate Policy"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://biz.heraldm.com/rss/010303000000.xml"
    description: "Herald Economy - Real estate policy news"
    notes: "Government regulations, policy changes."

  - id: herald_realestate_investment
    name: "Herald Economy - Real Estate Investment"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://biz.heraldm.com/rss/010305000000.xml"
    description: "Herald Economy - Real estate investment (재테크)"
    notes: "Investment strategies, market opportunities."

  - id: herald_realestate_market
    name: "Herald Economy - Market Prices"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://biz.heraldm.com/rss/010306000000.xml"
    description: "Herald Economy - Market prices and pre-sales (시세/분양정보)"
    notes: "Price trends, new development launches."

  - id: chosunbiz_realestate
    name: "Chosun Biz - Real Estate"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://biz.chosun.com/site/data/rss/estate.xml"
    description: "Chosun Business - Real estate section"
    notes: "Major newspaper's business section."

  - id: newsdaily_realestate
    name: "News Daily - Real Estate"
    type: rss
    enabled: false
    trust_tier: T2_professional
    info_purpose: news
    region: korea
    url: "http://www.newsdaily.kr/rss/S1N50.xml"
    description: "News Daily - Real estate section"
    notes: "Secondary news source."

  # ============================================================================
  # TIER 3: Aggregators & Market Data Platforms (T3_aggregator)
  # ============================================================================

  - id: kb_kbland
    name: "KB Kookmin Bank - Real Estate Data Hub"
    type: api
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: market_price
    region: korea
    url: "https://data.kbland.kr/"
    description: "KB Real Estate Data Hub - Housing price index, market trends"
    notes: "May require PublicDataReader library. No auth key needed for basic queries."

  - id: naver_land
    name: "Naver Land"
    type: html
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: listing
    region: korea
    url: "https://land.naver.com"
    description: "Naver real estate listing platform"
    notes: "No official API. Web scraping possible but check ToS. High data quality."

  - id: r114
    name: "R114 (부동산114)"
    type: html
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: listing
    region: korea
    url: "https://www.r114.com/"
    description: "Real estate 114 - Listing and market data platform"
    notes: "No official API confirmed. Major Korean real estate portal."

  - id: zigbang
    name: "Zigbang"
    type: html
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: listing
    region: korea
    url: "https://www.zigbang.com"
    description: "Zigbang - Real estate listing platform"
    notes: "No official public API. Popular rental/sale listing service."

  - id: zigbang_browser
    name: "Zigbang Browser Listings"
    type: browser
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: listing
    region: korea
    url: "https://www.zigbang.com/home/apt/danjis"
    timeout: 20000
    wait_for: "[data-testid='complex-card']"
    title_selector: ".title"
    content_selector: "main"
    link_selector: "[data-testid='complex-card'] a"
    description: "Zigbang JS-rendered apartment complex listing cards"
    notes: "Playwright collector source from Task 7 research."

  - id: dabang
    name: "Dabang"
    type: html
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: listing
    region: korea
    url: "https://www.dabangapp.com"
    description: "Dabang - Real estate listing platform"
    notes: "No official public API. Competitor to Zigbang."

  - id: onbid_auction
    name: "Onbid - Public Auction Properties"
    type: onbid
    enabled: false
    trust_tier: T1_official
    info_purpose: transaction
    region: korea
    api_doc: "https://www.data.go.kr/data/15101046/openapi.do"
    description: "Onbid public auction property listings and results"
    notes: "Requires ONBID_API_KEY environment variable. Real-time auction data."

  - id: subscription_apt
    name: "Apartment Subscription Information"
    type: subscription
    enabled: false
    trust_tier: T1_official
    info_purpose: subscription
    region: korea
    api_doc: "https://www.data.go.kr/data/15101046/openapi.do"
    description: "Apartment subscription (청약) and pre-sale information"
    notes: "Requires SUBSCRIPTION_API_KEY environment variable. Includes competition rates and schedules."

  - id: naver_land_main
    name: "Naver Land - Property Listings"
    type: naver_land
    enabled: false
    trust_tier: T3_aggregator
    info_purpose: listing
    region: korea
    base_url: "https://land.naver.com"
    search_url: "https://land.naver.com/search/result"
    timeout: 30
    max_items: 50
    max_pages: 3
    request_delay_min: 2.0
    request_delay_max: 5.0
    description: "Naver Land property listings with anti-bot scraping"
    notes: "Uses random user agents and natural delays to avoid detection. Collects 50+ properties per run."

# Trust tier definitions
trust_tiers:
  T1_official:
    score_multiplier: 1.5
    description: "Government and official sources"
  T2_professional:
    score_multiplier: 1.2
    description: "Professional media and industry sources"
  T3_aggregator:
    score_multiplier: 1.0
    description: "Aggregators and listing platforms"

# Info purpose categories
info_purposes:
  transaction:
    bonus: 100
    description: "Actual transaction data (price, volume)"
  subscription:
    bonus: 80
    description: "Subscription and pre-sale information"
  news:
    bonus: 60
    description: "Market news and analysis"
  listing:
    bonus: 40
    description: "Property listings and market prices"
  development:
    bonus: 90
    description: "Redevelopment and urban planning"
