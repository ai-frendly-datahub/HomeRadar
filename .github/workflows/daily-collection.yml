name: HomeRadar Daily Collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # 매일 01:00 UTC (KST 10:00)

permissions:
  contents: write

concurrency:
  group: homeradar-collection
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: Asia/Seoul

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install "radar-core @ git+https://github.com/ai-frendly-datahub/radar-core.git@main"
          pip install -r requirements.txt
      - name: Run collection
        env:
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
          SUBSCRIPTION_API_KEY: ${{ secrets.SUBSCRIPTION_API_KEY }}
          ONBID_API_KEY: ${{ secrets.ONBID_API_KEY }}
          RADAR_MAX_WORKERS: "1"
        run: python main.py --mode once --keep-days 90 --keep-raw-days 180 --keep-report-days 90 --generate-report --snapshot-db
      - name: Generate index.html
        run: |
          python -c "from homeradar.reporter import generate_index_html; from pathlib import Path; generate_index_html(Path('reports'))"
      - name: Run Quality Checks
        if: always()
        run: |
          python scripts/check_quality.py > quality_report.txt 2>&1 || true
          cat quality_report.txt >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
      - name: Verify dated data artifact
        run: |
          set -euo pipefail
          dates="$(date -u +%F) $(TZ=Asia/Seoul date +%F)"
          found=0
          for d in $dates; do
            if find "data/raw/$d" -type f ! -name ".gitkeep" -print -quit 2>/dev/null | grep -q .; then found=1; fi
            if find "data/snapshots/$d" -type f ! -name ".gitkeep" -print -quit 2>/dev/null | grep -q .; then found=1; fi
            if find "data/daily" -maxdepth 1 -type f -name "$d*" -print -quit 2>/dev/null | grep -q .; then found=1; fi
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No dated data artifact found for UTC/KST dates: $dates"
            find data -maxdepth 3 -type f \( -path "*/raw/*" -o -path "*/daily/*" -o -path "*/snapshots/*" \) | sort | tail -50 || true
            exit 1
          fi

      - name: Auto-commit data updates
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update home radar data [skip ci]"
          file_pattern: "data/ reports/ :(exclude)data/search_index.db*"
          add_options: "-f"
          skip_fetch: false
          skip_checkout: false

      - name: Archive Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ github.run_number }}
          path: quality_report.txt
          retention-days: 30
      - name: Archive DuckDB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homeradar-db-${{ github.run_number }}
          path: |
            data/homeradar.duckdb
            data/snapshots/
          retention-days: 30
          if-no-files-found: ignore
      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homeradar-reports
          path: reports/
          retention-days: 30
          if-no-files-found: error
