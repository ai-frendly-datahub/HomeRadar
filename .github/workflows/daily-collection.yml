name: HomeRadar Daily Collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *" # 매일 01:00 UTC (KST 10:00)

permissions:
  contents: write

concurrency:
  group: homeradar-collection
  cancel-in-progress: false

env:
  TZ: Asia/Seoul

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run collection
        env:
          MOLIT_SERVICE_KEY: ${{ secrets.MOLIT_SERVICE_KEY }}
        run: python main.py --mode once
      - name: Archive DuckDB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: homeradar-db-${{ github.run_number }}
          path: data/homeradar.duckdb
          retention-days: 30
          if-no-files-found: ignore
